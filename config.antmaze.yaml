# Minimal AntMaze training example. Official Minari data is downloaded on first use.
env_family: antmaze
model_name: Qwen/Qwen3-0.6B
load_in_4bit: false
max_length: 1024
checkpoint_root: checkpoints
result_root: results

wandb_enabled: false
parallel_backend: single
distributed_timeout_seconds: 1800

train_mode: single
train_varients: [large-play]
prompt_templete_index: [parallel_full_sensing]

dataset_workers: 4
dataset_cache_dir: dataset_cache
dataset_load_partitions: 1
dataloader_config:
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  non_blocking: false
train_data_ratio: 0.95
episode_keep_num: null
balance_variant_episode_count: false
sampling_seed: 42
history_num: 0
history_stride: 1

action_token_mode: parallel_l1
action_query_len: 8
action_head_num_blocks: 2
action_head_dropout: 0.0

learning_rate: 0.0001
num_epochs: 5
batch_size: 8
gradient_accumulation_steps: 4

lora_r: 16
lora_alpha: 32
lora_dropout: 0
lora_target_modules: [q_proj, k_proj, v_proj, o_proj]

eval_num_episodes: 10
eval_seed: 64
eval_step_interval: 0
step_eval_skip: 1
eval_mode: single
eval_variants: [large-play]
eval_parallel_episodes: 1
eval_distribute_variants: false
eval_env_kwargs:
  continuing_task: false
  reset_target: false

parse_retry_limit: 3
record_step_logs: true
action_sampling: false
action_temperature: 1.0
action_top_p: 1.0
action_top_k: 0
record_video: false
