network:
  hidden_units: [512, 512, 512]
  activation: relu
  use_batch_norm: false
  use_layer_norm: false
  dropout_rate: null

algorithm_config:
  batch_size: 512
  gamma: 0.99
  actor_learning_rate: 0.0001
  critic_learning_rate: 0.0001
  tau: 0.005
  n_critics: 2
  expectile: 0.9
  weight_temp: 3.0
  max_weight: 100.0
  reward_scaler:
    type: constant_shift
    shift: -1.0
  compile_graph: false
