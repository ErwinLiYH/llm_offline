# Single-seed paper-candidate protocol for the numeric map+sensing observation.
episode_keep_num: 300
episode_keep_per_variant: {}
balance_variant_episode_count: true
sampling_seed: 20260716
train_data_ratio: 0.9

seed: 0
device: cuda:0
n_steps: 500000
n_steps_per_epoch: 10000
save_interval_epochs: 10
show_progress: false

observation:
  include_map: true
  include_location_sensing: true
  include_wall_sensing: true
  wall_sensing_version: v3
  map_sensing_boundary_risk_threshold: 0.10

evaluation:
  enabled: true
  # Larger than the total epoch count, so only the mandatory final evaluation runs.
  every_epochs: 1000
  num_episodes: 100
  seed: 20260716

logging:
  wandb:
    enabled: false
