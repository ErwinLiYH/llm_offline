env_family: antmaze
train_mode: single
train_variants:
  - umaze

reward_type: null
allow_mixed_reward_types: false
local_dataset_root: null

episode_keep_num: null
episode_keep_per_variant: {}
balance_variant_episode_count: false
sampling_seed: 0
train_data_ratio: 0.9

seed: 0
device: cuda:0
n_steps: 1000000
n_steps_per_epoch: 10000
save_interval_epochs: 10
show_progress: true
output_root: baseline_runs
experiment_id: null

network:
  hidden_units: [256, 256]
  activation: relu
  use_batch_norm: false
  use_layer_norm: false
  dropout_rate: null

evaluation:
  enabled: true
  every_epochs: 10
  num_episodes: 10
  seed: 0
  env_config: {}

logging:
  wandb:
    enabled: false
    project: llm-offline-baselines
