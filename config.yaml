# General settings
env_family: pointmaze

model_name: Qwen/Qwen3.5-0.8B
load_in_4bit: false       # true = enable Unsloth 4-bit quantized loading
max_length: 1024

checkpoint_root: checkpoints  # root directory for saved checkpoints
result_root: resultsV2        # root directory for train/eval result outputs
# experiment_id: ab12cd34     # optional; if omitted, auto-generated per run

## Weights & Biases logging
wandb_enabled: true        # true = log train/val/eval metrics to W&B
wandb_project: llm_offline # W&B project name when enabled
wandb_entity: null         # optional W&B entity/team; null uses the SDK default
wandb_mode: null           # optional: online | offline | disabled; null uses the SDK default
wandb_log_interval: 10     # log train loss every n global train batches

## Parallel training
parallel_backend: single          # single | ddp; use torchrun with --parallel_backend ddp for multi-GPU
ddp_find_unused_parameters: false # keep false for LoRA/Unsloth unless DDP reports unused parameters
distributed_timeout_seconds: 1800 # process-group timeout for DDP startup/barriers


# Train-related settings

## Variant selection
train_mode: except        # single | all | except
train_varients: [open-dense, umaze-dense, medium-dense, large-dense, local-layout-07]  # single: exactly one; all: selected variants or omit for all; except: excluded variants
# train_mode: single
# train_varients: local-layout-07

## Prompt templates
prompt_templete_index: ["bin_no_sensing"]  # prompt file names without .txt used for each training split

## Data
dataset_workers: 3            # processes for parallel episode tokenization
dataset_cache_dir: dataset_cache  # cache tokenized dataset to disk; comment out to disable
train_data_ratio: 0.95         # train split ratio inside the sampled episode pool; val gets the remainder
episode_keep_num: 1500           # max episodes sampled before train/val splitting; if dataset has fewer, use all
balance_variant_episode_count: false  # true = align each selected variant's sampled episode pool to the smallest target
sampling_seed: 42              # reproducible seed for episode-level train/val sampling
# max_data_num: 320            # debug only: cap samples per dataset split; comment out for formal training

## History prompts
history_num: 0                 # number of sampled history transitions to include in each prompt; 0 disables history
history_stride: 1              # sample every n past transitions when building history

## Action mode
action_token_mode: bin  # text | bin | gaussian_bin | parallel_l1
action_num_bins: 50              # shared action-bin tokens: <act_00> ... <act_49>
new_token: false                 # false = reuse stable low-frequency tokenizer IDs internally; true = add <act_XX> special tokens
action_bin_min: -1.0
action_bin_max: 1.0
action_soft_label_sigma: 1.0     # gaussian_bin only, in bin-index units
# action_soft_label_radius: 3      # gaussian_bin only; train center bin plus n neighboring bins on each side
action_loss_weight: 1.0          # gaussian_bin action-token loss
action_stop_loss_weight: 1.0     # gaussian_bin chat-end token loss

## Optimization
learning_rate: 0.0001
num_epochs: 5
batch_size: 8
gradient_accumulation_steps: 4

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0
# lora_target_modules: ["q_proj", "v_proj"]
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]


# Eval-related settings

## Epoch-level and optional step-level environment evaluation
eval_num_episodes: 20    # rollout episodes per variant per training eval; 0 = disable rollout eval
eval_step_interval: 449802    # global train batch interval for step eval/checkpoints; 0 = prompt interactively after batches are known
eval_mode: except           # optional; defaults to following train_mode
eval_variants: [open-dense, umaze-dense, medium-dense, large-dense]  # single: one variant; all: selected variants or omit for all; except: excluded variants
# eval_mode: single
# eval_variants: local-layout-07
eval_env_kwargs:
  continuing_task: false

## Parsing and logs
parse_retry_limit: 3
record_step_logs: true   # whether to save one txt per eval step under the eval result artifacts directory
action_sampling: false    # true = sample actions during rollout eval; false = greedy decoding
action_temperature: 0.7  # lower = closer to argmax; higher = more random
action_top_p: 0.9        # nucleus sampling threshold when action_sampling=true
action_top_k: 0          # 0 disables top-k filtering

## Video recording
record_video: true       # whether to save rollout videos during training eval
record_all: true         # true = record every eval episode; overrides video_episode_index
video_episode_index: 0   # int or list of ints; which eval episodes to record when record_all=false
video_fps: 30
video_format: mp4        # gif works out of the box; mp4 requires ffmpeg backend support
mujoco_gl: egl           # headless MuJoCo recording backend on this machine
