name: d4rl_datagen
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  # Required by pip to install the exact Stable-Baselines3 Git revision used
  # by the official AntMaze SAC policy.
  - git
  - pip:
    # Keep the official PointMaze generator stack, but override its old
    # minari==0.4.3 pin. The repository's hard-sample generators use the
    # EpisodeBuffer API introduced in Minari 0.5.x, and data collection needs
    # the `create` (JAX) and `hdf5` extras.
    - numpy==1.26.4
    - scipy==1.12.0
    - packaging==24.0
    - gymnasium==0.29.1
    - gymnasium-robotics==1.2.4
    - minari[create,hdf5]==0.5.3
    - tqdm==4.66.2
    # AntMaze data generation loads the official SAC policy in CPU worker
    # processes. Pin a pre-PyTorch-2.6 CPU build to avoid both CUDA packages
    # and the newer torch.load default that is incompatible with old SB3 zips.
    - --extra-index-url https://download.pytorch.org/whl/cpu
    - torch==2.2.2+cpu
    - stable_baselines3 @ git+https://github.com/DLR-RM/stable-baselines3.git@f56ddeda10b1e3669a77a1c28c56944036286833
    - -r third_party/minari-dataset-generation-scripts/checks/requirements.txt
