model_path: checkpoints/antmaze/Qwen3-0.6B/large-play/3d19193e/final
load_in_4bit: false
parallel_backend: single
result_root: results
env_family: antmaze

eval_mode: single
variants: [large-play]
num_episodes: 20
rollout_worker_num: 1   # per eval rank; isolated env worker processes
rollout_worker_lifetime: slot
rollout_worker_retries: 1
rollout_worker_start_timeout_seconds: 120
rollout_action_timeout_seconds: 300
policy_batch_timeout_ms: 10
eval_distribute_variants: false
seed: 1

history_num: 0
history_stride: 1
parse_retry_limit: 3
record_step_logs: true
# prompt_templete_index: parallel_full_sensing  # optional; defaults to checkpoint's first training prompt
action_sampling: false
action_temperature: 1.0
action_top_p: 1.0
action_top_k: 0

record_video: true       # AntMaze saves rollout.<ext> and rollout_global.<ext> by default
record_all: true         # record all episodes; overrides video_episode_index
video_episode_index: 0   # which eval episode to record if record_all is false (0-based)
video_fps: 30
video_format: mp4        # gif works out of the box; mp4 requires ffmpeg backend support
video_save_workers: 1    # 0 = synchronous; >0 = concurrent background encoding threads
video_save_max_pending: 2  # running + queued tasks per rank; next submit blocks at this limit
mujoco_gl: egl           # headless MuJoCo recording backend on this machine
env_kwargs:
  continuing_task: false
  reset_target: false
