model_path: checkpoints/pointmaze/Qwen3-0.6B/except-large-dense+local-layout-07+medium-dense+open-dense+umaze-dense/d90c4dd1/final
# Qwen 0.6B bin: checkpoints/pointmaze/Qwen3-0.6B/except-large-dense+local-layout-07+medium-dense+open-dense+umaze-dense/dfb2837a/step250000
load_in_4bit: false
result_root: score_results
env_family: pointmaze
mode: score              # score | reference
eval_mode: all        # single | all | except
variants:
  - local-layout-07
num_episodes: 100
seed: 123
parse_retry_limit: 3
assume_yes: true         # true = continue through strong prompt warnings without interactive confirmation
prompt_templete_index: null
history_num: 0
history_stride: 1
action_sampling: false     # generation/bin modes: sample vs greedy; parallel_gaussian/parallel_t: sample vs mean action
mtp_quadratic_decoding: true  # mtp_bin only; false trusts the first MTP NTP+AQT proposal directly
action_temperature: 1.0
action_top_p: 1.0
action_top_k: 0
local_reference_root: local_references/pointmaze

# Optional video recording settings for score rollouts.
record_video: true
record_all: true
video_episode_index: 0
video_fps: 30
video_format: mp4
video_save_workers: 1      # 0 = synchronous; >0 = concurrent background encoding threads
video_save_max_pending: 2  # running + queued tasks; next submit blocks at this limit
mujoco_gl: egl

# Local/custom PointMaze score envs require an explicit fixed goal cell.
# Cells are 0-based [row, col] in the variant maze_map and must be free.
# Optional per-variant max_episode_steps overrides the local variant default.
local_eval_maps:
  local-layout-01:
    goal_cell: [6, 6]
  local-layout-02:
    goal_cell: [6, 8]
  local-layout-03:
    goal_cell: [7, 7]
  local-layout-04:
    goal_cell: [8, 6]
  local-layout-05:
    goal_cell: [8, 10]
  local-layout-06:
    goal_cell: [9, 9]
  local-layout-07:
    goal_cell: [7, 6]
  local-layout-08:
    goal_cell: [11, 11]
  local-layout-09:
    goal_cell: [12, 10]
