name: llm_offline
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - numpy
  - pyyaml
  - pip:
      # Isambard-AI is aarch64. Install PyTorch's CUDA wheel on a GPU
      # compute node so pip resolves the supported platform build.
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.10.0+cu128
      - torchvision==0.25.0+cu128
      - torchao==0.16.0
      - unsloth==2026.4.8
      - unsloth_zoo==2026.4.9
      - transformers==5.2.0
      - accelerate==1.13.0
      - peft==0.18.1
      - trl==0.24.0
      - datasets==4.3.0
      - bitsandbytes==0.49.2
      - minari==0.5.3
      - gymnasium==1.2.3
      - gymnasium-robotics==1.4.2
      - mujoco==3.6.0
      - h5py==3.16.0
      - wandb==0.27.0
      - imageio==2.37.3
      - imageio-ffmpeg==0.6.0
      - GitPython==3.1.50
      - sentencepiece==0.2.1
      - safetensors==0.7.0
      - openai==2.32.0
      - pytest
