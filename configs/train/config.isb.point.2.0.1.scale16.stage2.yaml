# Stage-2 medium-heavy fine-tune override.
# Merge only after the shared base config:
#   --config configs/train/config.isb.point.0.0.0.yaml configs/train/config.isb.point.2.0.1.wall_exp.stage2.yaml
#
# In train.py, model_path means "initialize a fresh run from this checkpoint".
# Do not pass --resume_from_checkpoint for this stage, because strict resume
# restores the old optimizer/scheduler/loop state and requires the old data
# partition plan.
model_path: /scratch/u6mx/yl1118.u6mx/checkpoints/pointmaze/Qwen3-0.6B/all-16v-e86b7b3a575d/5477145/ep5(step145940)

# Carry the V2 wall-exp setup directly here so this file only needs 0.0.0.
wandb_project: pointmazeV2layout
wall_sensing_version: v5
map_sensing_boundary_risk_threshold: 0.10

train_varients:
- open
- umaze
- medium
- large
- local-layoutV2-01
- local-layoutV2-02
- local-layoutV2-03
- local-layoutV2-04
- local-layoutV2-05
- local-layoutV2-06
- local-layoutV2-07
- local-layoutV2-08
- local-layoutV2-09
- local-layoutV2-10
- local-layoutV2-11
- local-layoutV2-12

dataset_load_partitions: 8
pointmaze_data_config:
  truncate: true
  truncate_holding: 20

# Keep all selected variants, but make medium dominate the second-stage data.
# Variants not listed here use episode_keep_num=20.
episode_keep_num: 20
episode_keep_per_varient:
  medium: 1200
  large: 350
  local-layoutV2-05: 50
  local-layoutV2-06: 50
  local-layoutV2-07: 50
  local-layoutV2-08: 50
  local-layoutV2-09: 30
  local-layoutV2-10: 30
  local-layoutV2-11: 30
  local-layoutV2-12: 30
balance_variant_episode_count: false

# Conservative short fine-tune. First check whether medium improves before
# adding more epochs or changing the Gaussian objective.
learning_rate: 1e-4
min_lr_ratio: 0.2
lr_scheduler_type: linear
lr_decay_ref_epochs: 4.0
warmup_ratio: 0.01
warmup_ratio_ref_epoch: 1.0
num_epochs: 20

# Evaluate enough episodes to reduce medium variance, but keep training eval
# focused and avoid generating a large video/log artifact set.
eval_num_episodes: 0 # close eval rollout
eval_step_interval: 0  # close eval rollout
eval_variants:
- open
- umaze
- medium
- large
record_step_logs: false
record_video: false

# exp branch/worktree only
local_dataset_root: /home/u6mx/yl1118.u6mx/llm_offline/local_datasets
dataset_cache_dir: /scratch/u6mx/yl1118.u6mx/dataset_cache_exp
