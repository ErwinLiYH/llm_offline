# General settings
env_family: antmaze

model_name: Qwen/Qwen3-0.6B
load_in_4bit: false       # true = enable Unsloth 4-bit quantized loading
max_length: 1024

checkpoint_root: /scratch/u6mx/yl1118.u6mx/checkpoints  # root directory for saved checkpoints
result_root: /scratch/u6mx/yl1118.u6mx/resultsV2        # root directory for train/eval result outputs
# experiment_id: ab12cd34     # optional; if omitted, auto-generated per run

## Weights & Biases logging
wandb_enabled: true
wandb_project: llm_offline_parallel
wandb_entity: null
wandb_mode: null
wandb_log_interval: 10

## System resource monitor
resource_monitor_enabled: true
resource_monitor_interval_seconds: 5.0

## Parallel training
parallel_backend: ddp
ddp_find_unused_parameters: false
distributed_timeout_seconds: 7200


# Train-related settings

## Variant selection
train_mode: all
train_varients: [large-play, large-diverse]

## Prompt templates
prompt_templete_index: ["bin_full_sensing"]

## Data
dataset_workers: 4            # tokenization worker processes per rank
dataset_cache_dir: /scratch/u6mx/yl1118.u6mx/dataset_cache
dataset_load_partitions: 4    # >1 splits train tokenized data into shard caches; DDP requires >= world_size and divisible by world_size
dataloader_config:
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  non_blocking: false
train_data_ratio: 0.95
episode_keep_num: 1000
balance_variant_episode_count: false
sampling_seed: 42
# max_data_num: 320

## History prompts
history_num: 0
history_stride: 1

## Action mode
action_token_mode: simple_mtp_bin  # text | bin | gaussian_bin | mtp_bin | simple_mtp_bin | parallel_l1 | parallel_gaussian | parallel_t

### Shared by bin / gaussian_bin / mtp_bin / simple_mtp_bin
action_num_bins: 50
new_token: false
action_bin_min: -1.0
action_bin_max: 1.0

### simple_mtp_bin only
mtp_lcm_weight: 0.1

## Optimization
learning_rate: 0.0001
min_lr_ratio: 0.1
lr_scheduler_type: cosine
lr_decay_ref_epochs: 9.0
warmup_ratio: 0.1
warmup_ratio_ref_epoch: 1.0
# warmup_steps: 200
# lr_decay_steps: 30000
num_epochs: 10
batch_size: 32
gradient_accumulation_steps: 1

# LoRA
lora_r: 128
lora_alpha: 128
lora_dropout: 0
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]


# Eval-related settings

## Epoch-level and optional step-level environment evaluation
eval_num_episodes: 20
eval_seed: 64
eval_step_interval: 50000
step_eval_skip: 1000
eval_mode: single
eval_variants: [large-play]
eval_parallel_episodes: 5
eval_distribute_variants: true
eval_env_kwargs:
  continuing_task: false
  reset_target: false

## Parsing and logs
parse_retry_limit: 3
record_step_logs: true
action_sampling: false
action_temperature: 0.7
action_top_p: 0.9
action_top_k: 0

## Video recording
record_video: true
record_all: true
video_episode_index: 0
video_fps: 30
video_format: mp4
video_save_workers: 5
video_save_max_pending: 10
mujoco_gl: egl
